version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: gingiai-postgres
    environment:
      POSTGRES_USER: gingiai
      POSTGRES_PASSWORD: gingiai_dev_password
      POSTGRES_DB: gingiai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gingiai"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: gingiai-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://gingiai:gingiai_dev_password@postgres:5432/gingiai
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CORS_ORIGINS: http://localhost:3000
      MODEL_PATH: /ml-model/models/gingivitis_rf_model.joblib
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gingiai-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    depends_on:
      - backend

volumes:
  postgres_data:
